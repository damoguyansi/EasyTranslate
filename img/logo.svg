<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="sheen" x1="80" y1="40" x2="280" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4F46E5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- rounded gradient tile -->
  <rect x="36" y="36" width="440" height="440" rx="112" fill="url(#bg)" filter="url(#soft)"/>
  <!-- glass sheen -->
  <rect x="36" y="36" width="440" height="440" rx="112" fill="url(#sheen)"/>
  <rect x="48" y="48" width="416" height="416" rx="100" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="4"/>

  <!-- Latin 'A' (left, solid white) -->
  <path d="M150 348 L206 168 L246 168 L302 348 L258 348 L247 308 L205 308 L194 348 Z M214 276 L238 276 L226 232 Z"
        fill="#ffffff"/>

  <!-- Chinese '文' (right, frosted) -->
  <g fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.96">
    <path d="M300 196 H402"/>
    <path d="M351 168 V206"/>
    <path d="M351 206 C351 250 338 296 300 340"/>
    <path d="M351 232 C360 286 384 322 410 344"/>
  </g>

  <!-- swap arrows linking the two glyphs -->
  <g stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <path d="M214 392 H300 l-22 -20 M300 392 l-22 20"/>
  </g>
</svg>
