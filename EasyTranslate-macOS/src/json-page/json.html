<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具大窗口 · EasyTranslate</title>
  <link rel="stylesheet" href="../styles/theme.css" />
  <link rel="stylesheet" href="./json.css" />

  <style>
    body { -webkit-app-region: drag; }
    .tool-tabs, .toolbar, .editor-wrap, .stats, button, input, select, textarea { -webkit-app-region: no-drag; }
  </style>
</head>
<body>
  <!-- 顶部交通灯条右侧：窗口置顶 -->
  <div class="titlebar-actions">
    <button id="pinToggle" class="icon-btn" title="窗口置顶">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
    </button>
  </div>
  <div class="wrap">
    <nav class="tool-tabs glass" id="toolTabs">
      <button class="tool-tab active" data-tool-tab="json">JSON</button>
      <button class="tool-tab" data-tool-tab="base64">Base64</button>
    </nav>

    <section class="tool-panel active" id="tool-panel-json">
      <div class="toolbar glass">
        <button id="formatBtn" class="btn btn-primary">✨ 格式化</button>
        <button id="compressBtn" class="btn">🗜️ 压缩</button>
        <button id="validateBtn" class="btn">✓ 校验</button>
        <span class="sep"></span>
        <button id="escapeBtn" class="btn">↘ 转义</button>
        <button id="unescapeBtn" class="btn">↗ 去转义</button>
        <button id="toUniBtn" class="btn">中→\\u</button>
        <button id="fromUniBtn" class="btn">\\u→中</button>
        <span class="sep"></span>
        <button id="copyBtn" class="btn">⧉ 复制</button>
        <button id="downloadBtn" class="btn">⬇ 下载</button>
        <button id="sampleBtn" class="btn">示例</button>
        <button id="clearBtn" class="btn btn-danger">🗑️ 清空</button>
        <div class="indent">
          <label for="indentSize">缩进</label>
          <select id="indentSize" class="field">
            <option value="2" selected>2 空格</option>
            <option value="4">4 空格</option>
            <option value="tab">Tab</option>
          </select>
        </div>
        <button id="themeToggle" class="icon-btn" title="切换主题">
          <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="i-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </div>

      <div class="panes">
        <section class="pane glass">
          <div class="pane-head">
            <span>📝 编辑区</span>
            <div class="tree-tools">
              <button id="expandAll" class="link-btn">全部展开</button>
              <button id="collapseAll" class="link-btn">全部折叠</button>
            </div>
          </div>
          <div class="editor-body">
            <pre id="gutter" class="gutter mono"></pre>
            <textarea id="jsonEditor" class="editor mono" spellcheck="false" placeholder='粘贴或输入 JSON 数据…'></textarea>
          </div>
        </section>

        <section class="pane glass">
          <div class="pane-head"><span>🌲 树形视图</span><span id="rootType" class="muted"></span></div>
          <div id="treeView" class="tree mono"></div>
        </section>
      </div>

      <div class="statusbar glass">
        <span>字符 <b id="charCount">0</b></span>
        <span>行数 <b id="lineCount">0</b></span>
        <span>大小 <b id="sizeCount">0 B</b></span>
        <span id="validState" class="muted">—</span>
        <div id="errorMessage" class="alert"></div>
      </div>
    </section>

    <section class="tool-panel" id="tool-panel-base64">
      <div class="base64-grid">
        <section class="pane glass">
          <div class="pane-head"><span>输入</span></div>
          <textarea id="base64Input" class="tool-textarea mono" placeholder="输入需要编码或解码的文本…"></textarea>
        </section>
        <section class="pane glass">
          <div class="pane-head"><span>结果</span><button id="b64CopyBtn" class="link-btn">复制</button></div>
          <textarea id="base64Output" class="tool-textarea mono" placeholder="结果将显示在这里…" readonly></textarea>
        </section>
      </div>
      <div class="statusbar glass">
        <button id="encodeBtn" class="btn btn-primary">编码</button>
        <button id="decodeBtn" class="btn btn-primary">解码</button>
        <button id="b64ClearBtn" class="btn btn-danger">清空</button>
        <div id="base64Error" class="alert"></div>
      </div>
    </section>
  </div>
  <script type="module" src="./json.js"></script>
</body>
</html>
