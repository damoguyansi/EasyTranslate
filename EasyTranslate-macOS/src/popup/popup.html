<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyTranslate · 工具箱</title>
  <link rel="stylesheet" href="../styles/theme.css" />
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <div class="app">
    <!-- 顶栏（可拖拽区域，菜单栏弹窗无标题栏） -->
  <header class="topbar">
      <div class="brand">
        <div class="brand-logo">译</div>
        <div class="brand-text">
          <strong>EasyTranslate</strong>
          <span>简单翻译 · 工具箱</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="screenshotBtn" class="icon-btn" title="截图 (微信式标注)">
          <svg style="transform: rotate(-90deg)" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
        </button>
        <button id="themeToggle" class="icon-btn" title="切换主题">
          <svg class="i-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="i-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
      </div>
    </header>

    <!-- 标签导航 -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="translate"><span>🌐</span>翻译</button>
      <button class="tab" data-tab="password"><span>🔐</span>密码</button>
      <button class="tab" data-tab="base64"><span>🔁</span>Base64</button>
      <button class="tab" data-tab="json"><span>{ }</span>JSON</button>
    </nav>

    <main class="panels">
      <!-- 翻译 -->
      <section class="panel active" id="panel-translate">
        <div class="lang-row glass">
          <select id="sourceLang" class="lang-select">
            <option value="auto" selected>自动检测</option>
            <option value="zh-Hans">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
          </select>
          <button id="switchLang" class="swap-btn" title="互换语言">⇄</button>
          <select id="targetLang" class="lang-select">
            <option value="zh-Hans" selected>中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
          </select>
          <span id="detectBadge" class="detect-badge" style="display:none"></span>
        </div>

        <div class="io-card glass">
          <textarea id="inputText" class="field io-text" placeholder="输入文字，自动检测语言并即时翻译…"></textarea>
          <div class="io-bar">
            <span id="charCount" class="muted">0 / 500</span>
            <button id="clearTranslate" class="link-btn">清空</button>
          </div>
        </div>

        <div class="io-card glass result">
          <textarea id="outputText" class="field io-text" placeholder="译文将显示在这里…" readonly></textarea>
          <div class="io-bar">
            <span class="muted">译文</span>
            <button id="copyTranslate" class="link-btn">⧉ 复制</button>
          </div>
        </div>

        <div class="history">
          <div class="history-head">
            <span>📜 翻译历史</span>
            <button id="clearHistory" class="link-btn">清空</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>

      <!-- 密码 -->
      <section class="panel" id="panel-password">
        <div class="pw-display glass">
          <input id="passwordDisplay" class="mono" type="text" readonly value="" />
          <div class="pw-display-actions">
            <button id="generateBtn" class="icon-btn" title="重新生成">🔄</button>
            <button id="copyPwBtn" class="icon-btn" title="复制">⧉</button>
          </div>
        </div>

        <div class="pw-strength">
          <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
          <span id="strengthText" class="muted">密码强度：未生成</span>
        </div>

        <div class="card glass">
          <div class="check-grid">
            <label class="check"><input type="checkbox" id="includeNumbers" checked /><span>数字 0-9</span></label>
            <label class="check"><input type="checkbox" id="includeLowercase" checked /><span>小写 a-z</span></label>
            <label class="check"><input type="checkbox" id="includeUppercase" checked /><span>大写 A-Z</span></label>
            <label class="check"><input type="checkbox" id="includeSymbols" /><span>符号 !@#</span></label>
          </div>
          <div class="length-row">
            <span class="muted">长度</span>
            <input type="range" id="lengthSlider" min="8" max="64" value="16" class="slider" />
            <input type="number" id="lengthValue" min="8" max="64" value="16" class="len-num mono" />
          </div>
          <div class="exclude-row">
            <span class="muted">排除字符</span>
            <input type="text" id="excludeChars" class="field mono" value="<>'/|(){}!~%?[]\ `,*=¥$^:" />
          </div>
        </div>
      </section>

      <!-- Base64 -->
      <section class="panel" id="panel-base64">
        <div class="card glass">
          <textarea id="base64Input" class="field mono tall" placeholder="输入需要编码或解码的文本…"></textarea>
        </div>
        <div class="btn-row">
          <button id="encodeBtn" class="btn btn-primary">🔒 编码</button>
          <button id="decodeBtn" class="btn btn-primary">🔓 解码</button>
          <button id="b64ClearBtn" class="btn btn-danger">清空</button>
        </div>
        <div class="card glass">
          <textarea id="base64Output" class="field mono tall" placeholder="结果将显示在这里…" readonly></textarea>
          <div class="io-bar"><span class="muted">结果</span><button id="b64CopyBtn" class="link-btn">⧉ 复制</button></div>
        </div>
      </section>

      <!-- JSON -->
      <section class="panel" id="panel-json">
        <div class="btn-row wrap">
          <button id="jsonFormatBtn" class="btn btn-primary">✨ 格式化</button>
          <button id="jsonCompressBtn" class="btn">🗜️ 压缩</button>
          <button id="jsonValidateBtn" class="btn">✓ 校验</button>
          <button id="jsonCopyBtn" class="btn">⧉ 复制</button>
          <button id="jsonClearBtn" class="btn btn-danger">清空</button>
          <button id="jsonOpenBtn" class="btn btn-primary">🔗 在新标签打开</button>
        </div>
        <div id="jsonBigHint" class="big-hint" style="display:none">
          <span>文本较大，建议在完整页面处理（带树形视图与更多工具）</span>
          <button id="jsonBigOpen" class="link-btn">前往 →</button>
        </div>
        <div id="jsonError" class="alert"></div>
        <div class="card glass">
          <textarea id="jsonEditor" class="field mono tall xl" placeholder="输入或粘贴 JSON 数据…"></textarea>
        </div>
        <div class="json-stats muted">
          <span>字符 <b id="jsonChars">0</b></span>
          <span>行 <b id="jsonLines">0</b></span>
          <span>大小 <b id="jsonSize">0 B</b></span>
        </div>
      </section>
    </main>

    <footer class="footer">
  <label class="login-item-label">
    <input type="checkbox" id="loginItemCheck" />
    <span>开机自启</span>
  </label>
  <a id="feedbackLink" href="#" class="footer-link">问题反馈 ⭐</a>
</footer>
  </div>

  <script type="module" src="./popup.js"></script>
</body>
</html>
